<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ring Searcher</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f5;
  color: #222;
}

header {
  background: #1a1a1a;
  color: #fff;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

header h1 { font-size: 1.2rem; font-weight: 600; letter-spacing: 0.05em; }
header span { font-size: 0.8rem; color: #888; }

.container { max-width: 1000px; margin: 0 auto; padding: 32px 20px; }

/* Upload box */
.upload-box {
  background: #fff;
  border-radius: 12px;
  padding: 32px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  margin-bottom: 32px;
}

.upload-box h2 { font-size: 1rem; margin-bottom: 16px; color: #444; font-weight: 500; }

.drop-area {
  border: 2px dashed #ccc;
  border-radius: 8px;
  padding: 48px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s;
  position: relative;
}

.drop-area:hover, .drop-area.over { border-color: #c9a84c; background: #fffdf5; }

.drop-area input {
  position: absolute; inset: 0;
  opacity: 0; cursor: pointer;
  width: 100%; height: 100%;
}

.drop-area p { color: #888; font-size: 0.9rem; margin-top: 8px; }

#preview-section { display: none; margin-top: 16px; text-align: center; }
#preview-section img { max-height: 160px; border-radius: 8px; border: 1px solid #e0e0e0; }
#preview-section p { margin-top: 6px; font-size: 0.78rem; color: #999; }

.row { display: flex; gap: 12px; margin-top: 16px; align-items: flex-end; flex-wrap: wrap; }

.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.08em; }
.field input, .field select {
  border: 1px solid #ddd; border-radius: 6px;
  padding: 8px 10px; font-size: 0.88rem;
  outline: none; width: 110px;
}
.field input:focus { border-color: #c9a84c; }

button.search-btn {
  background: #c9a84c; color: #1a1a1a;
  border: none; border-radius: 6px;
  padding: 9px 28px; font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: background 0.2s;
}
button.search-btn:hover { background: #b8922e; }
button.search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Loading */
#loading { display: none; text-align: center; padding: 32px; }
.spinner {
  width: 32px; height: 32px;
  border: 3px solid #e0e0e0; border-top-color: #c9a84c;
  border-radius: 50%; animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { color: #888; font-size: 0.9rem; }

/* Results */
#results { display: none; }
.results-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
}
.results-header h2 { font-size: 1.1rem; }
.results-header small { color: #888; font-size: 0.8rem; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
}

.card {
  background: #fff; border-radius: 10px;
  border: 1px solid #e0e0e0;
  overflow: hidden; cursor: pointer;
  transition: box-shadow 0.2s, transform 0.2s;
}
.card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.12); transform: translateY(-2px); }

.card .img { aspect-ratio: 1; background: #fafafa; display: flex; align-items: center; justify-content: center; padding: 8px; }
.card img { width: 100%; height: 100%; object-fit: contain; }

.card .info { padding: 10px 12px; border-top: 1px solid #f0f0f0; }
.card .pct { font-size: 1rem; font-weight: 700; color: #c9a84c; }
.card .bar-wrap { height: 3px; background: #f0f0f0; border-radius: 2px; margin: 4px 0; }
.card .bar { height: 100%; background: #c9a84c; border-radius: 2px; }
.card .fname { font-size: 0.7rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card .variants { font-size: 0.68rem; color: #bbb; margin-top: 2px; }

/* Admin */
.admin { text-align: right; margin-bottom: 12px; }
.admin button {
  background: none; border: 1px solid #ddd; border-radius: 6px;
  padding: 7px 16px; font-size: 0.8rem; color: #888; cursor: pointer;
}
.admin button:hover { border-color: #c9a84c; color: #555; }

/* Customise modal */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 100;
  align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: #fff; border-radius: 12px;
  padding: 28px; max-width: 480px; width: 90%;
  position: relative; max-height: 85vh; overflow-y: auto;
}
.modal h3 { margin-bottom: 16px; font-size: 1.1rem; }
.modal-close {
  position: absolute; top: 14px; right: 18px;
  background: none; border: none; font-size: 1.3rem;
  cursor: pointer; color: #888;
}
.opt-group { margin-bottom: 16px; }
.opt-group label { display: block; font-size: 0.72rem; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.pills { display: flex; flex-wrap: wrap; gap: 6px; }
.pill {
  padding: 5px 12px; border: 1px solid #ddd; border-radius: 20px;
  font-size: 0.78rem; cursor: pointer; transition: border-color 0.15s;
}
.pill:hover { border-color: #c9a84c; }
.pill.active { border-color: #c9a84c; background: #fffdf0; }
</style>
</head>
<body>

<header>
  <h1>💍 Ring Searcher</h1>
  <span id="catalog-info">Loading…</span>
</header>

<div class="container">

  <div class="upload-box">
    <h2>Upload a ring image to find similar designs</h2>

    <div class="drop-area" id="drop-area">
      <input type="file" id="file-input" accept="image/*"/>
      <div style="font-size:2rem;">📷</div>
      <p>Click or drag & drop your ring photo here</p>
      <p style="font-size:0.75rem;margin-top:4px;">JPG · PNG · WEBP · BMP</p>
    </div>

    <div id="preview-section">
      <img id="preview-img" src="" alt="preview"/>
      <p id="preview-name"></p>
    </div>

    <div class="row">
      <div class="field">
        <label>Show results</label>
        <input type="number" id="top-k" value="10" min="1" max="50"/>
      </div>
      <div class="field">
        <label>Dedup %</label>
        <input type="number" id="threshold" value="85" min="50" max="99"/>
      </div>
      <button class="search-btn" id="search-btn" disabled>Search</button>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p>Finding similar rings…</p>
  </div>

  <div class="admin">
    <button onclick="rebuild()">⟳ Rebuild Index</button>
  </div>

  <div id="results">
    <div class="results-header">
      <h2>Similar Rings</h2>
      <small id="results-info"></small>
    </div>
    <div class="grid" id="grid"></div>
  </div>

</div>

<!-- Customise modal -->
<div class="overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h3>Customise Ring</h3>
    <div id="modal-content"></div>
  </div>
</div>

<script>
// catalog info
fetch('/catalog-info').then(r=>r.json()).then(d=>{
  document.getElementById('catalog-info').textContent = `${d.indexed} rings indexed`;
});

// drag & drop
const dropArea = document.getElementById('drop-area');
const fileInput = document.getElementById('file-input');
const searchBtn = document.getElementById('search-btn');
let file = null;

dropArea.addEventListener('dragover', e=>{ e.preventDefault(); dropArea.classList.add('over'); });
dropArea.addEventListener('dragleave', ()=>dropArea.classList.remove('over'));
dropArea.addEventListener('drop', e=>{ e.preventDefault(); dropArea.classList.remove('over'); if(e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', ()=>{ if(fileInput.files[0]) setFile(fileInput.files[0]); });

function setFile(f) {
  file = f;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('preview-img').src = e.target.result;
    document.getElementById('preview-name').textContent = f.name;
    document.getElementById('preview-section').style.display = 'block';
  };
  reader.readAsDataURL(f);
  searchBtn.disabled = false;
}

// search
searchBtn.addEventListener('click', async () => {
  if (!file) return;
  searchBtn.disabled = true;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').style.display = 'none';

  const form = new FormData();
  form.append('file', file);
  form.append('top_k', document.getElementById('top-k').value);
  form.append('threshold', document.getElementById('threshold').value);

  try {
    const res  = await fetch('/upload', {method:'POST', body:form});
    const data = await res.json();
    document.getElementById('loading').style.display = 'none';
    if (data.error) { alert(data.error); searchBtn.disabled=false; return; }
    renderResults(data);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    alert('Something went wrong. Check the server log.');
    searchBtn.disabled = false;
  }
});

function renderResults(data) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('results-info').textContent =
    `${data.matches.length} unique designs from ${data.total} indexed rings`;

  if (!data.matches.length) {
    grid.innerHTML = '<p style="color:#aaa;grid-column:1/-1;">No matches found. Add more rings to catalog/.</p>';
  }

  data.matches.forEach(m => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="img"><img src="${m.image_url}" loading="lazy"/></div>
      <div class="info">
        <div class="pct">${m.similarity}%</div>
        <div class="bar-wrap"><div class="bar" style="width:${Math.min(m.similarity,100)}%"></div></div>
        <div class="fname">${m.filename}</div>
        ${m.variants > 1 ? `<div class="variants">${m.variants} variants merged</div>` : ''}
      </div>`;
    card.addEventListener('click', () => openCustomise(m.index));
    grid.appendChild(card);
  });

  document.getElementById('results').style.display = 'block';
  searchBtn.disabled = false;
}

// customise modal
async function openCustomise(idx) {
  const res  = await fetch(`/customize/${idx}`);
  const opts = await res.json();
  const body = document.getElementById('modal-content');
  body.innerHTML = '';

  [
    ['Stone', opts.stone_types],
    ['Size',  opts.stone_sizes],
    ['Position', opts.positions],
  ].forEach(([label, items]) => {
    const g = document.createElement('div');
    g.className = 'opt-group';
    g.innerHTML = `<label>${label}</label><div class="pills">${items.map(s=>`<span class="pill">${s}</span>`).join('')}</div>`;
    g.querySelectorAll('.pill').forEach(p => p.addEventListener('click', () => {
      g.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
      p.classList.add('active');
    }));
    body.appendChild(g);
  });

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// rebuild
async function rebuild() {
  if (!confirm('Rebuild catalog index? This may take a minute.')) return;
  const res = await fetch('/rebuild', {method:'POST'});
  const d   = await res.json();
  if (d.ok) {
    alert(`Done! ${d.indexed} rings indexed.`);
    document.getElementById('catalog-info').textContent = `${d.indexed} rings indexed`;
  } else {
    alert('Error: ' + d.error);
  }
}
</script>
</body>
</html>
